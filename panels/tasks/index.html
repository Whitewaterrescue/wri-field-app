<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WRI Tasks</title>
<link rel="icon" href="data:,">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{
    --bg:#0a0c10;--surface:#111827;--surface-alt:#1a2234;
    --accent:#cc0000;
    --text:#e5e7eb;--text-dim:#9ca3af;--text-muted:#6b7280;
    --border:#2a2f3a;--success:#22c55e;--warning:#f59e0b;
    --font:-apple-system,system-ui,'Segoe UI',Roboto,sans-serif;
  }
  html,body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;min-height:100vh}
  .topbar{
    position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:10px;
    padding:12px 14px;background:var(--bg);border-bottom:1px solid var(--border);
  }
  .topbar h1{font-size:17px;font-weight:700;flex:1}
  .role-chip{
    padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;
    background:var(--surface-alt);color:var(--text-dim);border:1px solid var(--border);
    cursor:pointer;font-family:var(--font);white-space:nowrap;
  }
  .role-chip:active{opacity:0.8}
  .offline-banner{
    display:none;padding:8px 14px;background:#3b2a08;color:var(--warning);
    font-size:13px;text-align:center;
  }
  .offline-banner.show{display:block}
  #content{padding:14px;max-width:640px;margin:0 auto;padding-bottom:50px}
  .prompt{color:var(--text-dim);font-size:14px;margin:6px 2px 14px}
  .role-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .role-card{
    min-height:74px;display:flex;align-items:center;justify-content:center;text-align:center;
    padding:14px 12px;border-radius:12px;background:#1e293b;border:1px solid #334155;
    color:var(--text);font-size:15px;font-weight:600;line-height:1.3;cursor:pointer;font-family:var(--font);
  }
  .role-card:active{transform:scale(0.97)}
  .phase-row{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:2px}
  .phase-btn{
    padding:10px 18px;border-radius:20px;font-size:14px;font-weight:600;white-space:nowrap;
    background:var(--surface);color:var(--text-dim);border:1px solid var(--border);
    cursor:pointer;font-family:var(--font);
  }
  .phase-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .progress{
    font-size:13px;color:var(--text-dim);margin:0 2px 12px;
  }
  .progress b{color:var(--success)}
  .section-title{
    font-size:12px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;
    color:var(--text-dim);margin:18px 0 8px 2px;
  }
  .task{
    display:flex;align-items:center;gap:12px;padding:13px 12px;margin-bottom:8px;
    background:var(--surface);border:1px solid var(--border);border-radius:10px;
  }
  .task.done{opacity:0.55}
  .task.done .task-label{text-decoration:line-through}
  .task-check{
    width:26px;height:26px;min-width:26px;border-radius:8px;border:2px solid var(--border);
    background:transparent;display:flex;align-items:center;justify-content:center;
    color:transparent;font-size:15px;cursor:pointer;font-family:var(--font);
  }
  .task.done .task-check{background:var(--success);border-color:var(--success);color:#0a0c10}
  .task-label{flex:1;font-size:14px;line-height:1.35}
  .task-link{
    padding:10px 14px;border-radius:8px;font-size:13px;font-weight:700;white-space:nowrap;
    color:#fff;text-decoration:none;background:#334155;
  }
  .task-link:active{opacity:0.8}
  .task-link.green{background:#3d5a3e}.task-link.red{background:#cc0000}
  .task-link.blue{background:#2563eb}.task-link.amber{background:#b45309}
  .task-link.orange{background:#b45309}.task-link.teal{background:#0d9488}
  .task-link.dark{background:#1e293b}.task-link.slate{background:#334155}
  .reset-row{text-align:center;margin-top:24px}
  .reset-btn{
    padding:10px 18px;border-radius:8px;font-size:13px;background:transparent;
    color:var(--text-muted);border:1px solid var(--border);cursor:pointer;font-family:var(--font);
  }
  .empty,.loading{color:var(--text-muted);text-align:center;padding:40px 20px;font-size:14px}
  .spin{
    width:26px;height:26px;margin:0 auto 12px;border-radius:50%;
    border:3px solid var(--border);border-top-color:var(--accent);
    animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
  <div class="topbar">
    <h1 id="title">WRI Field Tasks</h1>
    <button id="roleChip" class="role-chip" style="display:none" onclick="changeRole()">Change role</button>
  </div>
  <div id="offline" class="offline-banner">Offline &mdash; showing last saved checklist</div>
  <div id="content"><div class="loading"><div class="spin"></div>Loading&hellip;</div></div>

<script>
  var API = 'https://script.google.com/macros/s/AKfycbzfQnJ9AKRTJU3yVpVfHF8bxAZZBmWeKYdL5XbQgZr09bUYB3IgQZVomPxrLAXck_D9/exec';
  var CACHE_KEY = 'wri_tasks_cache';
  var PHASE_ORDER = ['initial', 'daily', 'demob'];
  var roles = null;       // { roleId: { label, sections: [{title, tasks:[]}] } }
  var currentPhase = null;

  function loadCache() {
    try {
      var c = JSON.parse(localStorage.getItem(CACHE_KEY));
      if (c && c.roles) return c.roles;
    } catch (e) {}
    return null;
  }

  function init() {
    var cached = loadCache();
    if (cached) { roles = cached; render(); }
    fetch(API + '?api=tasks')
      .then(function (r) { return r.json(); })
      .then(function (d) {
        if (d && d.ok && d.tasks) {
          roles = d.tasks;
          try { localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), roles: roles })); } catch (e) {}
          document.getElementById('offline').classList.remove('show');
          render();
        } else if (!cached) {
          document.getElementById('content').innerHTML =
            '<div class="empty">Task checklist is not available.<br>Use the Forms page to launch apps directly.</div>';
        }
      })
      .catch(function () {
        if (cached) document.getElementById('offline').classList.add('show');
        else document.getElementById('content').innerHTML =
          '<div class="empty">Could not load the checklist.<br>Check your connection and reload.</div>';
      });
  }

  function roleLabel(id) {
    if (roles[id] && roles[id].label && roles[id].label !== id) return roles[id].label;
    return id.replace(/_/g, ' ').replace(/\b\w/g, function (c) { return c.toUpperCase(); });
  }

  function changeRole() {
    localStorage.removeItem('wri_role');
    currentPhase = null;
    render();
  }

  function selectRole(id) {
    localStorage.setItem('wri_role', id);
    currentPhase = null;
    render();
  }

  function selectPhase(p) {
    currentPhase = p;
    render();
  }

  function doneKey(role) { return 'wri_tasks_done_' + role; }

  function getDone(role) {
    try { return JSON.parse(localStorage.getItem(doneKey(role))) || {}; } catch (e) { return {}; }
  }

  function toggleTask(role, taskId) {
    var done = getDone(role);
    if (done[taskId]) delete done[taskId]; else done[taskId] = 1;
    try { localStorage.setItem(doneKey(role), JSON.stringify(done)); } catch (e) {}
    render();
  }

  function resetTasks(role) {
    localStorage.removeItem(doneKey(role));
    render();
  }

  // A task's phase cell may hold several comma-separated phases ("Initial,Daily")
  function taskPhases(t) {
    var list = (t.phase || '').toLowerCase().split(',')
      .map(function (p) { return p.trim(); })
      .filter(Boolean);
    return list.length ? list : ['general'];
  }

  function phasesFor(role) {
    var seen = {};
    (role.sections || []).forEach(function (sec) {
      (sec.tasks || []).forEach(function (t) {
        taskPhases(t).forEach(function (p) { seen[p] = 1; });
      });
    });
    var list = Object.keys(seen);
    list.sort(function (a, b) {
      var ia = PHASE_ORDER.indexOf(a), ib = PHASE_ORDER.indexOf(b);
      return (ia === -1 ? 99 : ia) - (ib === -1 ? 99 : ib);
    });
    return list;
  }

  function render() {
    if (!roles) return;
    var roleId = localStorage.getItem('wri_role');
    var chip = document.getElementById('roleChip');

    // Role picker
    if (!roleId || !roles[roleId]) {
      chip.style.display = 'none';
      document.getElementById('title').textContent = 'WRI Field Tasks';
      var h = '<div class="prompt">Pick your role for this incident. You can change it any time.</div><div class="role-grid">';
      Object.keys(roles).forEach(function (id) {
        h += '<button class="role-card" onclick="selectRole(\'' + id + '\')">' + esc(roleLabel(id)) + '</button>';
      });
      document.getElementById('content').innerHTML = h + '</div>';
      return;
    }

    var role = roles[roleId];
    chip.style.display = '';
    chip.textContent = roleLabel(roleId) + ' • change';
    document.getElementById('title').textContent = 'Tasks';

    var phases = phasesFor(role);
    if (!currentPhase || phases.indexOf(currentPhase) === -1) currentPhase = phases[0];
    var done = getDone(roleId);

    var h = '';
    if (phases.length > 1) {
      h += '<div class="phase-row">';
      phases.forEach(function (p) {
        h += '<button class="phase-btn' + (p === currentPhase ? ' active' : '') + '" onclick="selectPhase(\'' + p + '\')">' +
          esc(p.charAt(0).toUpperCase() + p.slice(1)) + '</button>';
      });
      h += '</div>';
    }

    var total = 0, checked = 0, body = '';
    (role.sections || []).forEach(function (sec) {
      var tasks = (sec.tasks || []).filter(function (t) {
        return taskPhases(t).indexOf(currentPhase) !== -1;
      });
      if (!tasks.length) return;
      if (sec.title) body += '<div class="section-title">' + esc(sec.title) + '</div>';
      tasks.forEach(function (t) {
        total++;
        var isDone = !!done[t.id];
        if (isDone) checked++;
        body += '<div class="task' + (isDone ? ' done' : '') + '">' +
          '<button class="task-check" onclick="toggleTask(\'' + roleId + '\',\'' + esc(t.id) + '\')">&#10003;</button>' +
          '<div class="task-label">' + esc(t.label) + '</div>';
        if (t.url) {
          var c = (t.buttonColor || 'slate').toLowerCase();
          body += '<a class="task-link ' + esc(c) + '" href="' + esc(t.url) + '" target="_blank" rel="noopener">' +
            esc(t.linkLabel || 'Open') + '</a>';
        }
        body += '</div>';
      });
    });

    if (total) h += '<div class="progress"><b>' + checked + '</b> / ' + total + ' complete</div>';
    h += body || '<div class="empty">No tasks in this phase.</div>';
    if (total) h += '<div class="reset-row"><button class="reset-btn" onclick="resetTasks(\'' + roleId + '\')">Reset checklist</button></div>';
    document.getElementById('content').innerHTML = h;
  }

  function esc(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  init();
</script>
</body>
</html>
