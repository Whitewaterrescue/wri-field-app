<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WRI Forms</title>
<link rel="icon" href="data:,">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{
    --bg:#0a0c10;--surface:#111827;--surface-alt:#1a2234;
    --accent:#cc0000;
    --text:#e5e7eb;--text-dim:#9ca3af;--text-muted:#6b7280;
    --border:#2a2f3a;--warning:#f59e0b;
    --font:-apple-system,system-ui,'Segoe UI',Roboto,sans-serif;
  }
  html,body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;min-height:100vh}
  .search-bar{
    position:sticky;top:0;z-index:10;background:var(--bg);
    padding:12px 14px 10px;border-bottom:1px solid var(--border);
  }
  .search-bar input{
    width:100%;padding:13px 16px;font-size:16px;color:var(--text);
    background:var(--surface);border:1px solid var(--border);border-radius:10px;outline:none;
  }
  .search-bar input:focus{border-color:var(--accent)}
  .offline-banner{
    display:none;padding:8px 14px;background:#3b2a08;color:var(--warning);
    font-size:13px;text-align:center;
  }
  .offline-banner.show{display:block}
  #content{padding:12px 14px 40px;max-width:640px;margin:0 auto}
  .section-title{
    font-size:12px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;
    color:var(--text-dim);margin:20px 0 10px 2px;
  }
  .btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .app-btn{
    display:flex;align-items:center;justify-content:center;text-align:center;
    min-height:56px;padding:12px 14px;border-radius:10px;border:none;
    font-size:15px;font-weight:600;line-height:1.3;color:#fff;
    text-decoration:none;cursor:pointer;width:100%;font-family:var(--font);
  }
  .app-btn:active{transform:scale(0.97);opacity:0.85}
  .app-btn.full{grid-column:1 / -1}
  .app-btn.green{background:#3d5a3e}
  .app-btn.red{background:#cc0000}
  .app-btn.blue{background:#2563eb}
  .app-btn.amber,.app-btn.orange{background:#b45309}
  .app-btn.dark{background:#1e293b}
  .app-btn.slate{background:#334155}
  .app-btn.white{background:#e5e7eb;color:#1a1a2e}
  .app-btn.teal{background:#0d9488}
  .group{grid-column:1 / -1}
  .group.half{grid-column:auto}
  .group .app-btn .caret{margin-left:8px;font-size:11px;opacity:0.7;transition:transform .15s}
  .group.open .app-btn .caret{transform:rotate(180deg)}
  .submenu{
    display:none;flex-wrap:wrap;gap:6px;padding:8px;margin-top:6px;
    background:var(--surface);border:1px solid var(--border);border-radius:8px;
  }
  .group.open .submenu{display:flex}
  .submenu-link{
    flex:1;min-width:130px;padding:13px 10px;border-radius:8px;
    background:var(--surface-alt);color:var(--text);text-align:center;
    font-size:14px;font-weight:600;text-decoration:none;border:1px solid var(--border);
  }
  .submenu-link:active{opacity:0.8}
  .submenu-link.dead{opacity:0.4;pointer-events:none}
  .empty,.loading{color:var(--text-muted);text-align:center;padding:40px 20px;font-size:14px}
  .spin{
    width:26px;height:26px;margin:0 auto 12px;border-radius:50%;
    border:3px solid var(--border);border-top-color:var(--accent);
    animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  /* In-panel form overlay — forms open here instead of a new tab */
  .overlay{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;background:var(--bg)}
  .overlay[hidden]{display:none}
  .overlay-bar{
    display:flex;align-items:center;gap:10px;padding:8px 10px;
    background:var(--surface);border-bottom:1px solid var(--border);min-height:48px;
  }
  .ov-back{
    display:flex;align-items:center;gap:4px;padding:9px 14px;border-radius:8px;border:none;
    background:var(--accent);color:#fff;font-size:14px;font-weight:700;
    cursor:pointer;font-family:var(--font);white-space:nowrap;
  }
  .ov-back:active{opacity:0.85}
  .ov-title{
    flex:1;font-size:14px;font-weight:600;color:var(--text);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .ov-newtab{
    padding:9px 12px;border-radius:8px;font-size:13px;font-weight:600;white-space:nowrap;
    color:var(--text-dim);text-decoration:none;border:1px solid var(--border);
  }
  .ov-newtab:active{opacity:0.8}
  .ov-frame-wrap{position:relative;flex:1;background:#fff}
  .ov-frame-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
  .ov-loading{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    background:var(--bg);pointer-events:none;
  }
</style>
</head>
<body>
  <div class="search-bar">
    <input id="search" type="search" placeholder="Search forms &amp; apps&hellip;" autocomplete="off">
  </div>
  <div id="offline" class="offline-banner">Offline &mdash; showing last saved list</div>
  <div id="content"><div class="loading"><div class="spin"></div>Loading forms&hellip;</div></div>

  <div id="overlay" class="overlay" hidden>
    <div class="overlay-bar">
      <button class="ov-back" onclick="closeOverlay()">&#8249; Back</button>
      <div class="ov-title" id="ovTitle"></div>
      <a class="ov-newtab" id="ovNewTab" href="#" target="_blank" rel="noopener">Open in tab &#8599;</a>
    </div>
    <div class="ov-frame-wrap">
      <div class="ov-loading" id="ovLoading"><div class="spin"></div></div>
      <iframe id="ovFrame" title="Form" allow="geolocation" allowfullscreen></iframe>
    </div>
  </div>

<script>
  var API = 'https://script.google.com/macros/s/AKfycbzcg-yD3_ALkdGYVEOuGY3VR8NrlsPRoxL6k-4LKX3SqEI6NlaKkpprKCtez2xo9C2u/exec';
  var CACHE_KEY = 'wri_forms_cache';
  var allApps = [];

  // Hosts that refuse to render in an iframe (X-Frame-Options / CSP / login
  // redirects) no matter what the sheet says. Everything else defaults to
  // embeddable unless its Embed flag says no.
  var NEVER_EMBED = ['docs.google.com', 'accounts.google.com', 'app.mapnova.com',
                     'dashboard.pexcard.com', 'experience.arcgis.com', 'arcg.is'];

  function canEmbed(url, flag) {
    if (flag === false || flag === '0') return false;
    var host;
    try { host = new URL(url).hostname; } catch (e) { return false; }
    return !NEVER_EMBED.some(function (b) { return host === b || host.slice(-(b.length + 1)) === '.' + b; });
  }

  var overlayOpen = false;

  function openOverlay(url, name) {
    // A fresh iframe per open: an iframe's FIRST navigation adds no joint
    // history entry, and removing the element (vs. navigating to about:blank)
    // adds none either — so the pushState entry below stays adjacent and
    // history.back() always pops the overlay, not an iframe navigation.
    var oldFrame = document.getElementById('ovFrame');
    if (oldFrame) oldFrame.remove();
    var frame = document.createElement('iframe');
    frame.id = 'ovFrame';
    frame.title = 'Form';
    frame.setAttribute('allow', 'geolocation');
    frame.setAttribute('allowfullscreen', '');
    frame.onload = function () { document.getElementById('ovLoading').style.display = 'none'; };
    frame.src = url;
    document.getElementById('ovTitle').textContent = name || '';
    document.getElementById('ovNewTab').href = url;
    document.getElementById('ovLoading').style.display = '';
    document.querySelector('.ov-frame-wrap').appendChild(frame);
    document.getElementById('overlay').hidden = false;
    document.body.style.overflow = 'hidden';
    overlayOpen = true;
    // History entry so the hardware/browser Back button closes the overlay
    // instead of leaving the site (popstate handler below does the teardown).
    try { history.pushState({ wriOverlay: 1 }, ''); } catch (e) {}
  }

  function dismissOverlay() {
    var frame = document.getElementById('ovFrame');
    if (frame) frame.remove();
    document.getElementById('overlay').hidden = true;
    document.body.style.overflow = '';
    overlayOpen = false;
  }

  function closeOverlay() {
    if (overlayOpen && history.state && history.state.wriOverlay) {
      history.back(); // popstate → dismissOverlay, keeps history balanced
    } else {
      dismissOverlay();
    }
  }

  window.addEventListener('popstate', function () {
    if (overlayOpen) dismissOverlay();
  });

  // Delegated click: [data-open] anchors open in the overlay when embeddable,
  // otherwise fall through to their normal target=_blank behavior.
  document.addEventListener('click', function (ev) {
    var a = ev.target.closest ? ev.target.closest('a[data-open]') : null;
    if (!a) return;
    if (canEmbed(a.href, a.getAttribute('data-embed') !== '0')) {
      ev.preventDefault();
      openOverlay(a.href, a.getAttribute('data-name') || a.textContent);
    }
  });

  function loadCache() {
    try {
      var c = JSON.parse(localStorage.getItem(CACHE_KEY));
      if (c && c.apps) return c.apps;
    } catch (e) {}
    return null;
  }

  function saveCache(apps) {
    try { localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), apps: apps })); } catch (e) {}
  }

  function init() {
    var cached = loadCache();
    if (cached) { allApps = cached; render(); }
    fetch(API + '?api=apps')
      .then(function (r) { return r.json(); })
      .then(function (d) {
        if (d && d.ok && d.apps) {
          allApps = d.apps;
          saveCache(d.apps);
          document.getElementById('offline').classList.remove('show');
          render();
        } else if (!cached) {
          showError();
        }
      })
      .catch(function () {
        if (cached) document.getElementById('offline').classList.add('show');
        else showError();
      });
  }

  function showError() {
    document.getElementById('content').innerHTML =
      '<div class="empty">Could not load the forms list.<br>Check your connection and pull to refresh.</div>';
  }

  function matches(app, q) {
    if (!q) return true;
    if (app.name.toLowerCase().indexOf(q) !== -1) return true;
    if ((app.section || '').toLowerCase().indexOf(q) !== -1) return true;
    return (app.subLinks || []).some(function (s) { return s.name.toLowerCase().indexOf(q) !== -1; });
  }

  function render() {
    var q = document.getElementById('search').value.trim().toLowerCase();
    // table-type rows are Mission-Hub-internal editors; no launchable URL
    var apps = allApps.filter(function (a) { return a.type !== 'table' && matches(a, q); });

    if (!apps.length) {
      document.getElementById('content').innerHTML = '<div class="empty">No matching forms.</div>';
      return;
    }

    // Group by section, preserving sheet order; blank sections last as "More Tools"
    var sections = [], byName = {};
    apps.forEach(function (a) {
      var key = a.section || '';
      if (!(key in byName)) { byName[key] = []; sections.push(key); }
      byName[key].push(a);
    });
    sections.sort(function (a, b) { return (a === '') - (b === ''); });

    var html = '';
    sections.forEach(function (sec) {
      html += '<div class="section-title">' + esc(sec || 'More Tools') + '</div><div class="btn-grid">';
      byName[sec].forEach(function (a) { html += renderApp(a, q); });
      html += '</div>';
    });
    document.getElementById('content').innerHTML = html;
  }

  function renderApp(a, q) {
    var color = (a.color || 'slate').toLowerCase();
    var width = (a.width || 'full').toLowerCase() === 'half' ? 'half' : 'full';
    var subs = a.subLinks || [];
    if (subs.length) {
      // Auto-expand groups when the search matched a sublink
      var open = q && subs.some(function (s) { return s.name.toLowerCase().indexOf(q) !== -1; });
      var h = '<div class="group ' + width + (open ? ' open' : '') + '">' +
        '<button class="app-btn ' + color + ' full" onclick="this.parentNode.classList.toggle(\'open\')">' +
        esc(a.name) + '<span class="caret">&#9660;</span></button><div class="submenu">';
      subs.forEach(function (s) {
        h += s.url
          ? '<a class="submenu-link" href="' + esc(s.url) + '" target="_blank" rel="noopener" data-open' +
            ' data-embed="' + (s.embed === false ? '0' : '1') + '" data-name="' + esc(s.name) + '">' + esc(s.name) + '</a>'
          : '<span class="submenu-link dead">' + esc(s.name) + '</span>';
      });
      return h + '</div></div>';
    }
    if (!a.url) return '';
    return '<a class="app-btn ' + color + ' ' + width + '" href="' + esc(a.url) + '" target="_blank" rel="noopener" data-open' +
      ' data-embed="' + (a.embed === false ? '0' : '1') + '" data-name="' + esc(a.name) + '">' + esc(a.name) + '</a>';
  }

  function esc(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  document.getElementById('search').addEventListener('input', render);
  init();
</script>
</body>
</html>
